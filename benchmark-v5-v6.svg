<text x="138" y="556.0" font-size="13" fill="#1E293B" text-anchor="end">10k paragraphs</text>
<rect x="150" y="514" width="145.9" height="22" rx="3" fill="#94A3B8"/>
<text x="303.9" y="530" font-size="12" font-weight="400" fill="#64748B">183 MB</text>
<text x="158" y="530" font-size="11" font-weight="700" fill="#fff">v5</text>
<rect x="150" y="541" width="53.1" height="22" rx="3" fill="#0D8D85"/>
<text x="211.1" y="557" font-size="12" font-weight="700" fill="#1E293B">67 MB</text>
<text x="158" y="557" font-size="11" font-weight="700" fill="#fff">v6</text>
<text x="138" y="629.0" font-size="13" fill="#1E293B" text-anchor="end">huge.html</text>
