<svg xmlns="http://www.w3.org/2000/svg" width="920" height="920" viewBox="0 0 920 920" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
<rect width="920" height="920" fill="#ffffff"/>
<text x="150" y="52" font-size="24" font-weight="800" fill="#1E293B">ReverseMarkdown v5 vs v6 performance</text>
<text x="150" y="76" font-size="13" fill="#64748B">BenchmarkDotNet, .NET 9.0, Apple M1. v5 = 5.5.0 (HtmlAgilityPack), v6 = 6.0.0 (AngleSharp + Markdown DOM).</text>
<rect x="594" y="92" width="12" height="12" rx="2" fill="#94A3B8"/><text x="612" y="102" font-size="12" fill="#1E293B">v5 (5.5.0)</text>
<rect x="686" y="92" width="12" height="12" rx="2" fill="#0D8D85"/><text x="704" y="102" font-size="12" fill="#1E293B">v6 (6.0.0)</text>
<text x="150" y="150" font-size="17" font-weight="700" fill="#1E293B">Mean execution time</text>
<text x="770" y="150" font-size="12" fill="#64748B" text-anchor="end">ms, lower is better</text>
<text x="138" y="214.0" font-size="13" fill="#1E293B" text-anchor="end">1000 paragraphs</text>
<rect x="150" y="172" width="15.7" height="22" rx="3" fill="#94A3B8"/>
<text x="173.7" y="188" font-size="12" font-weight="400" fill="#64748B">13.7 ms</text>
<rect x="150" y="199" width="5.9" height="22" rx="3" fill="#0D8D85"/>
<text x="163.9" y="215" font-size="12" font-weight="700" fill="#1E293B">5.2 ms</text>
<text x="138" y="287.0" font-size="13" fill="#1E293B" text-anchor="end">10k paragraphs</text>
<rect x="150" y="245" width="136.6" height="22" rx="3" fill="#94A3B8"/>
<text x="294.6" y="261" font-size="12" font-weight="400" fill="#64748B">119.1 ms</text>
<text x="158" y="261" font-size="11" font-weight="700" fill="#fff">v5</text>
<rect x="150" y="272" width="72.4" height="22" rx="3" fill="#0D8D85"/>
<text x="230.4" y="288" font-size="12" font-weight="700" fill="#1E293B">63.1 ms</text>
<text x="158" y="288" font-size="11" font-weight="700" fill="#fff">v6</text>
<text x="138" y="360.0" font-size="13" fill="#1E293B" text-anchor="end">huge.html</text>
<rect x="150" y="318" width="620.0" height="22" rx="3" fill="#94A3B8"/>
<text x="778.0" y="334" font-size="12" font-weight="400" fill="#64748B">540.6 ms</text>
<text x="158" y="334" font-size="11" font-weight="700" fill="#fff">v5</text>
<rect x="150" y="345" width="280.2" height="22" rx="3" fill="#0D8D85"/>
<text x="438.2" y="361" font-size="12" font-weight="700" fill="#1E293B">244.3 ms</text>
<text x="158" y="361" font-size="11" font-weight="700" fill="#fff">v6</text>
<text x="150" y="419" font-size="17" font-weight="700" fill="#1E293B">Allocated memory</text>
<text x="770" y="419" font-size="12" fill="#64748B" text-anchor="end">MB, lower is better</text>
<text x="138" y="483.0" font-size="13" fill="#1E293B" text-anchor="end">1000 paragraphs</text>
<rect x="150" y="441" width="16.5" height="22" rx="3" fill="#94A3B8"/>
