<text x="778.0" y="603" font-size="12" font-weight="400" fill="#64748B">779 MB</text>
<text x="158" y="603" font-size="11" font-weight="700" fill="#fff">v5</text>
<rect x="150" y="614" width="228.8" height="22" rx="3" fill="#0D8D85"/>
