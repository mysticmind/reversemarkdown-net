name: Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  job:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: Linux
          - os: windows-latest
            artifact-name: Win64
          #- os: macos-latest
          #  artifact-name: Darwin
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: Install .NET SDKs (8/9/10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Display dotnet info
        run: dotnet --list-sdks
      # Build the library for every target framework (including netstandard2.0),
      # so a break in the downlevel build is caught here rather than at publish time.
      - name: Build library (all target frameworks)
        run: dotnet build src/ReverseMarkdown/ReverseMarkdown.csproj -c Release
      # Run the test suite across every test target framework (net8.0/net9.0/net10.0).
      - name: Run tests
        run: dotnet test src/ReverseMarkdown.Test/ReverseMarkdown.Test.csproj -c Release
