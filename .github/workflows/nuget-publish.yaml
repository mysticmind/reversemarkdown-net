name: NuGet Manual Publish

on: [workflow_dispatch]

env:
  config: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  publish_job:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # enable GitHub OIDC token issuance for trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET 9.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run Pack
        run: dotnet pack src/ReverseMarkdown/ReverseMarkdown.csproj -c Release
        shell: bash

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived
      # NuGet API key (valid ~1 hour), so no long-lived secret is stored.
      # Requires a trusted publishing policy configured on nuget.org for this
      # repository and workflow file. See:
      # https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # nuget.org username (profile name), NOT an email address

      - name: Publish to NuGet
        run: |
          find . -name '*.nupkg' -exec dotnet nuget push "{}" -s https://api.nuget.org/v3/index.json -k ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate \;
          # find . -name '*.snupkg' -exec dotnet nuget push "{}" -s https://api.nuget.org/v3/index.json -k ${{ steps.login.outputs.NUGET_API_KEY }} \;
        shell: bash
